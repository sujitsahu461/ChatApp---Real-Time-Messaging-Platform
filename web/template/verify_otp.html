<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP — ChatApp</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'webapp/favicon.svg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #111b21;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: #00a884;
            height: 220px;
            width: 100%;
        }

        .card-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            margin-top: -160px;
            padding: 20px;
        }

        .card {
            background: #202c33;
            border-radius: 16px;
            padding: 40px 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        .lock-icon {
            font-size: 60px;
            margin-bottom: 16px;
        }

        .card h1 {
            color: #e9edef;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .card .subtitle {
            color: #8696a0;
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .phone-display {
            color: #00a884;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 28px;
        }

        .error-msg {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.4);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .otp-inputs input {
            width: 48px;
            height: 56px;
            background: #2a3942;
            border: 2px solid #2a3942;
            border-radius: 10px;
            color: #e9edef;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .otp-inputs input:focus { border-color: #00a884; }

        .hidden-otp { display: none; }

        .submit-btn {
            width: 100%;
            background: #00a884;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s, transform 0.1s;
        }
        .submit-btn:hover { background: #00c49e; transform: translateY(-1px); }

        .resend-link {
            margin-top: 20px;
            color: #8696a0;
            font-size: 13px;
        }

        .resend-link a {
            color: #00a884;
            text-decoration: none;
            font-weight: 600;
        }
        .resend-link a:hover { text-decoration: underline; }

        .back-link {
            margin-top: 12px;
        }
        .back-link a {
            color: #8696a0;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link a:hover { color: #e9edef; }

        .hint {
            color: #8696a0;
            font-size: 12px;
            margin-top: 16px;
            background: #182229;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <div class="card-wrapper">
        <div class="card">
            <div class="lock-icon">🔐</div>
            <h1>Verify Phone</h1>
            <p class="subtitle">Enter the 6-digit code sent to</p>
            <p class="phone-display">+91 {{ phone }}</p>

            {% if error %}
                <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}

            <form method="post" action="" id="otpForm">
                {% csrf_token %}
                <div class="otp-inputs">
                    <input type="text" maxlength="1" class="otp-box" data-index="0" autofocus>
                    <input type="text" maxlength="1" class="otp-box" data-index="1">
                    <input type="text" maxlength="1" class="otp-box" data-index="2">
                    <input type="text" maxlength="1" class="otp-box" data-index="3">
                    <input type="text" maxlength="1" class="otp-box" data-index="4">
                    <input type="text" maxlength="1" class="otp-box" data-index="5">
                </div>
                <input type="hidden" name="otp" id="otpHidden">
                <button class="submit-btn" type="submit">Verify & Create Account</button>
            </form>

            <p class="resend-link">Didn't receive the code? <a href="/signup/">Resend OTP</a></p>
            <p class="back-link"><a href="/signup/">← Back to Sign Up</a></p>
            <p class="hint">💡 Check the <strong>server terminal</strong> for the OTP code</p>
        </div>
    </div>

    <script>
        const boxes = document.querySelectorAll('.otp-box');
        const hiddenInput = document.getElementById('otpHidden');

        boxes.forEach((box, i) => {
            box.addEventListener('input', (e) => {
                const val = e.target.value;
                if (val && i < 5) boxes[i + 1].focus();
                updateHidden();
            });
            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !box.value && i > 0) {
                    boxes[i - 1].focus();
                }
            });
            // Allow paste
            box.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                pasted.split('').forEach((ch, j) => {
                    if (boxes[j]) boxes[j].value = ch;
                });
                if (boxes[Math.min(pasted.length, 5)]) boxes[Math.min(pasted.length, 5)].focus();
                updateHidden();
            });
        });

        function updateHidden() {
            hiddenInput.value = Array.from(boxes).map(b => b.value).join('');
        }

        document.getElementById('otpForm').addEventListener('submit', function() {
            updateHidden();
        });
    </script>
</body>
</html>
