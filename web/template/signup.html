<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ChatApp</title>
    <link rel="icon" type="image/svg+xml" href="{% static 'webapp/favicon.svg' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #111b21;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            background: #00a884;
            height: 220px;
            width: 100%;
        }

        .card-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            margin-top: -160px;
            padding: 20px;
        }

        .card {
            background: #202c33;
            border-radius: 16px;
            padding: 40px 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            font-size: 52px;
            display: block;
            margin-bottom: 10px;
        }

        .logo-area h1 {
            color: #e9edef;
            font-size: 24px;
            font-weight: 700;
        }

        .logo-area p {
            color: #8696a0;
            font-size: 13px;
            margin-top: 4px;
        }

        .error-msg {
            background: rgba(255, 68, 68, 0.15);
            border: 1px solid rgba(255, 68, 68, 0.4);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            color: #00a884;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            background: #2a3942;
            border: 1px solid #2a3942;
            border-radius: 8px;
            padding: 14px 16px;
            color: #e9edef;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #00a884; }
        input::placeholder { color: #8696a0; font-size: 14px; }

        .phone-input-wrapper {
            display: flex;
            gap: 8px;
        }

        .country-code {
            width: 80px;
            background: #2a3942;
            border: 1px solid #2a3942;
            border-radius: 8px;
            padding: 14px 10px;
            color: #e9edef;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            text-align: center;
        }
        .country-code:focus { border-color: #00a884; }

        .phone-input-wrapper input { flex: 1; }

        .submit-btn {
            width: 100%;
            background: #00a884;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
        }
        .submit-btn:hover { background: #00c49e; transform: translateY(-1px); }
        .submit-btn:active { transform: translateY(0); }

        .alt-link {
            text-align: center;
            margin-top: 20px;
            color: #8696a0;
            font-size: 14px;
        }

        .alt-link a {
            color: #00a884;
            text-decoration: none;
            font-weight: 600;
        }
        .alt-link a:hover { text-decoration: underline; }

        .footer {
            text-align: center;
            padding: 20px;
            color: #8696a0;
            font-size: 12px;
        }

        .hint {
            color: #8696a0;
            font-size: 11px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="top-bar"></div>
    <div class="card-wrapper">
        <div class="card">
            <div class="logo-area">
                <span class="logo-icon">💬</span>
                <h1>Create Account</h1>
                <p>Join ChatApp and start messaging</p>
            </div>

            {% if error %}
                <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}

            <form method="post" action="">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus>
                    <p class="hint">Others will see this name in chat</p>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <div class="phone-input-wrapper">
                        <input class="country-code" type="text" value="+91" readonly>
                        <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required pattern="[0-9]{10}" maxlength="10">
                    </div>
                    <p class="hint">We'll send an OTP to verify your number</p>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label for="confirmpassword">Confirm Password</label>
                    <input type="password" id="confirmpassword" name="confirmpassword" placeholder="Repeat your password" required>
                </div>
                <button class="submit-btn" type="submit">Send OTP →</button>
            </form>

            <p class="alt-link">Already have an account? <a href="/signin/">Sign In</a></p>
        </div>
    </div>
    <div class="footer">ChatApp &copy; 2024 — All messages encrypted</div>
</body>
</html>
